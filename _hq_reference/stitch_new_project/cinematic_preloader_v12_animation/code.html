<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Prashanth P. | Cinematic Portfolio</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@1,6..72,200..800&amp;family=Inter:wght@100..900&amp;family=Noto+Sans+Kannada:wght@100..900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              colors: {
                "on-secondary-fixed": "#011c39",
                "surface-dim": "#131313",
                "secondary-fixed-dim": "#b1c8ed",
                "on-primary-fixed": "#001c3a",
                "primary-fixed-dim": "#a5c8ff",

                "on-background": "#e2e2e2",
                "outline": "#8b919d",
                "on-tertiary": "#00344b",
                "on-surface-variant": "#c1c7d3",
                "primary-container": "#206fc0",
                "on-primary": "#00315e",
                "tertiary-fixed-dim": "#81cfff",
                "outline-variant": "#414751",
                "on-surface": "#e2e2e2",
                "secondary-fixed": "#d4e3ff",
                "inverse-on-surface": "#303030",
                "surface-container-lowest": "#0e0e0e",
                "surface-container-high": "#2a2a2a",
                "surface": "#131313",
                "on-secondary": "#1a314f",
                "tertiary-container": "#0076a3",
                "surface-variant": "#353535",
                "tertiary-fixed": "#c6e7ff",
                "surface-container-highest": "#353535",
                "on-tertiary-container": "#e6f4ff",
                "on-primary-container": "#ecf1ff",
                "error": "#ffb4ab",
                "surface-container-low": "#1b1b1b",
                "on-tertiary-fixed-variant": "#004c6b",
                "surface-container": "#1f1f1f",
                "primary": "#a5c8ff",
                "inverse-surface": "#e2e2e2",
                "inverse-primary": "#005fad",
                "error-container": "#93000a",
                "primary-fixed": "#d4e3ff",
                "on-secondary-container": "#a0b6db",
                "surface-bright": "#393939",
                "secondary": "#b1c8ed",
                "on-tertiary-fixed": "#001e2d",
                "surface-tint": "#a5c8ff",
                "background": "#131313",
                "on-secondary-fixed-variant": "#314867",
                "secondary-container": "#314867",

              },
              fontFamily: {
                "headline": ["Newsreader"],
                "body": ["Inter"],
                "label": ["Inter"],

              },
              borderRadius: {"DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem"},
            },
          },
        }

<style>
        .film-grain {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 9999;
            opacity: 0.03;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }

        .shimmer-text {
            background: linear-gradient(90deg, #e2e2e2 0%, #206FC0 50%, #e2e2e2 100%);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: sweep 3s linear infinite;
        }

        @keyframes sweep {
            0% { background-position: 200% center; }
            100% { background-position: -200% center; }
        }

        .film-strip-loading {
            height: 4px;
            background: repeating-linear-gradient(
                90deg,
                #314867 0px,
                #314867 10px,
                transparent 10px,
                transparent 14px
            );
            position: relative;
        }

        .film-strip-progress {
            height: 100%;
            width: 65%; /* Simulated load state */
            background-color: #206FC0;
            transition: width 0.5s ease-out;
        }

        .vertical-split {
            position: absolute;
            left: 50%;
            top: 0;
            bottom: 0;
            width: 1px;
            background: linear-gradient(to bottom, transparent, rgba(65, 71, 81, 0.15), transparent);
        }

        .sprocket-hole {
            width: 8px;
            height: 12px;
            background-color: #0e0e0e;
            border-radius: 1px;
        }
    </style>
</head>
<body class="bg-[#000000] text-on-surface font-body overflow-hidden">
<!-- Film Grain Overlay -->
<div class="film-grain"></div>
<!-- 35mm Film Strip Loader (Top) -->
<div class="fixed top-0 left-0 w-full z-[100]">
<div class="film-strip-loading w-full">
<div class="film-strip-progress"></div>
</div>
<!-- Sprocket Holes Visual Detail -->
<div class="flex justify-between px-4 mt-1 opacity-20">
<div class="sprocket-hole"></div>
<div class="sprocket-hole"></div>
<div class="sprocket-hole"></div>
<div class="sprocket-hole"></div>
<div class="sprocket-hole"></div>
<div class="sprocket-hole"></div>
<div class="sprocket-hole"></div>
<div class="sprocket-hole"></div>
</div>
</div>
<!-- Main Preloader Content -->
<main class="relative h-screen w-full flex flex-col items-center justify-center overflow-hidden">
<!-- Central Vertical Split Cue -->
<div class="vertical-split"></div>
<!-- Wordmark Section -->
<div class="relative z-10 flex flex-col items-center text-center px-6">
<!-- Subtitle -->
<div class="label-sm font-label text-[0.6875rem] tracking-[0.4em] text-on-surface-variant/40 mb-8 uppercase">
                Director / Cinematographer
            </div>
<!-- Central Wordmark -->
<h1 class="font-headline italic text-4xl md:text-6xl lg:text-7xl tracking-[0.2em] mb-4 shimmer-text">
                PRASHANTH P.
            </h1>
<!-- Bilingual Loading Text -->
<div class="mt-12 flex flex-col items-center gap-2">
<span class="font-kannada text-primary-container/60 text-lg tracking-widest">ಲೋಡಿಂಗ್...</span>
<div class="w-12 h-[1px] bg-outline-variant/20"></div>
<span class="label-sm font-label text-[0.5rem] tracking-[0.3em] text-on-surface-variant/30 uppercase mt-2">Initializing Sequence</span>
</div>
</div>
<!-- Ambient Atmospheric Decor -->
<div class="absolute bottom-12 left-12 opacity-10">
<div class="font-label text-[0.6rem] tracking-widest text-on-surface space-y-1">
<p>REF: 24FPS_RAW</p>
<p>ISO: 800</p>
<p>LENS: 35MM ANAMORPHIC</p>
</div>
</div>
<div class="absolute bottom-12 right-12 opacity-10">
<div class="font-label text-[0.6rem] tracking-widest text-on-surface text-right space-y-1">
<p>EST. 2024</p>
<p>PORTFOLIO REEL V.1.0</p>
<p>© PRASHANTH P.</p>
</div>
</div>
<!-- Perspective Grid Hint (Subtle) -->
<div class="absolute inset-0 pointer-events-none">
<div class="h-full w-full opacity-[0.02]" style="background-image: radial-gradient(circle at center, #206FC0 1px, transparent 1px); background-size: 60px 60px;">
</div>
</div>
</main>
<!-- Bottom Aesthetic Accents -->
<div class="fixed bottom-0 left-0 w-full p-8 flex justify-between items-end z-50 pointer-events-none">
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-[14px] text-primary-container" style="font-variation-settings: 'FILL' 1;">lens_blur</span>
<div class="h-[1px] w-24 bg-outline-variant/10"></div>
</div>
<div class="flex items-center gap-4">
<div class="h-[1px] w-24 bg-outline-variant/10"></div>
<span class="material-symbols-outlined text-[14px] text-primary-container">camera_indoor</span>
</div>
</div>
<!-- Background Layering for Depth -->
<div class="fixed inset-0 z-[-1] bg-surface-container-lowest">
<!-- Subtle gradient glow following light sweep -->
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[600px] h-[600px] bg-primary/5 rounded-full blur-[120px]"></div>
</div>
</body></html>
